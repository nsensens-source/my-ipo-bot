name: TOPMOVER

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      # 🧩 ดึง Cache ของ Playwright (Chromium) มาใช้เพื่อความรวดเร็ว
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright
      
      - name: Install Dependencies
        run: |
          pip install requests playwright yfinance supabase pandas lxml
          # ถ้ามี Cache อยู่แล้ว คำสั่งนี้จะทำงานเสร็จไวมาก (ไม่โหลดใหม่)
          playwright install chromium

      - name: Execute System
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_TOPMOVER }}
          TEST_MODE: ${{ secrets.TEST_MODE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
                 
          # 2. ดึงเวลาปัจจุบันของแต่ละโซน (ใช้ %-H เพื่อลบเลข 0 นำหน้า ป้องกันบั๊กใน Bash)
          BKK_HOUR=$(TZ='Asia/Bangkok' date +%-H)
          NY_HOUR=$(TZ='America/New_York' date +%-H)
          
          # ปริ้นท์เวลาออกมาดูเพื่อง่ายต่อการ Debug
          echo "⏰ BKK Hour: $BKK_HOUR"
          echo "🗽 NY Hour: $NY_HOUR"
          echo "---------------------------------"
          
          # 🇹🇭 Thai Market: เช็คเวลาไทย 10:00 - 16:59
          if [ "$BKK_HOUR" -ge 10 ] && [ "$BKK_HOUR" -le 16 ]; then
            echo "🇹🇭 Scanning THAI Market..."
            python 03_top_movers.py TH
            
          # 🇺🇸 US Market: เช็คเวลานิวยอร์ก 09:00 - 15:59 (จัดการ Summer/Winter Auto)
          elif [ "$NY_HOUR" -ge 9 ] && [ "$NY_HOUR" -le 15 ]; then
            echo "🇺🇸 Scanning US Market..."
            python 03_top_movers.py US
            
          else
            echo "💤 Market closed (or outside scanning hours). Skipping scan."
          fi
