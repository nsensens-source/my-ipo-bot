name: Global Trading Bot (Main System)

on:
  schedule:
    # 🇹🇭 ตลาดหุ้นไทย รันทุก 1 ชั่วโมง
    # เวลาไทย: 10:13, 11:13, 12:13, 14:13, 15:13, 16:13
    - cron: '13 3,4,5,7,8,9 * * 1-5'
    
    # 🇺🇸 ตลาดหุ้นอเมริกา (ตั้งเผื่อคลุมทั้ง Summer และ Winter)
    # เวลา UTC: 13, 14, 15, 16, 17, 18 (เวลาไทย 20:13 - 01:13)
    - cron: '13 13,14,15,16,17,18 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: |
          pip install requests playwright yfinance supabase pandas lxml
      - name: Cache playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
        key: playwright

      - name: Execute System
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TEST_MODE: ${{ secrets.TEST_MODE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. อัปเดตรายชื่อหุ้นใหม่เข้า Database ทุกครั้ง
          python 01_scraper.py
          
          # 2. เช็คเวลา กทม. เพื่อกรองว่าเป็นรอบของฝั่งไหน
          BKK_HOUR=$(TZ='Asia/Bangkok' date +%H)
          
          # 🧩 แบ่งรอบแบบ เหมากลางวัน (ไทย) vs เหมากลางคืน (อเมริกา)
          if [[ "06 07 08 09 10 11 12 13 14 15 16 17 18" =~ "$BKK_HOUR" ]]; then
            echo "🇹🇭 Scanning THAI Market (Daytime)..."
            python 02_monitor.py TH
          
          else
            # 🗽 โซนกลางคืน: ดึงเวลานิวยอร์ก (จัดการ Summer/Winter อัตโนมัติ)
            NY_HOUR=$(TZ='America/New_York' date +%H)
            echo "🗽 Current New York Hour is: $NY_HOUR"
            
            # ตลาด US เปิด 09:30 - 16:00 (นิวยอร์ก)
            # เราจะให้รันเฉพาะชั่วโมง 09 ถึง 15 (หยุดรันหลังบ่าย 3 นิวยอร์ก เพื่อให้นอนพักผ่อน)
            if [[ "09 10 11 12 13 14 15" =~ "$NY_HOUR" ]]; then
              echo "🇺🇸 Market is OPEN! Scanning US Market..."
              python 02_monitor.py US
            else
              echo "💤 US Market is outside target hours (or user is sleeping). Skipping scan."
            fi
          fi
