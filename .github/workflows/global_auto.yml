name: Global Trading Bot (Main System)

on:
  schedule:
    # 🇹🇭 ตลาดหุ้นไทย (เวลา UTC +7)
    - cron: '15 5 * * 1-5'   # 12:15 น. ไทย (พักเที่ยง - เช็คเทรนด์รอบเช้า)
    - cron: '15 9 * * 1-5'   # 16:15 น. ไทย (สไนเปอร์: ก่อนตลาดปิด 15 นาที)
    
    # 🇺🇸 ตลาดหุ้นอเมริกา (เวลา UTC +7)
    - cron: '15 15 * * 1-5'  # 22:15 น. ไทย (ตลาดเปิดมาแล้ว 45 นาที - เช็คเทรนด์)
    - cron: '45 20 * * 1-5'  # 03:45 น. ไทย (สไนเปอร์: ก่อนตลาดปิด 15 นาที)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: |
          pip install requests playwright yfinance supabase pandas lxml
          playwright install chromium

      - name: Execute System
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TEST_MODE: ${{ secrets.TEST_MODE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. อัปเดตรายชื่อหุ้นใหม่เข้า Database ทุกครั้ง
          python 01_scraper.py
          
          # 2. เช็คเวลาเพื่อแยกรันตลาด (แปลงเป็นเวลาไทย +7)
          HOUR=$(TZ='Asia/Bangkok' date +%H)
          
          if [ "$HOUR" == "12" ] || [ "$HOUR" == "16" ]; then
            echo "🇹🇭 Scanning THAI Market..."
            python 02_monitor.py TH
          
          elif [ "$HOUR" == "22" ] || [ "$HOUR" == "03" ]; then
            echo "🇺🇸 Scanning US Market..."
            python 02_monitor.py US
          
          else
            echo "🌍 Scanning ALL Markets (Fallback)..."
            python 02_monitor.py ALL
          fi
