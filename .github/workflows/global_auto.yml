name: Global Trading Bot (Main System)

on:
  schedule:
    # 🇹🇭 ตลาดหุ้นไทย รันทุก 1 ชั่วโมง (10:15, 11:15, 12:15, 14:15, 15:15, 16:15 เวลาไทย)
    - cron: '15 3,4,5,7,8,9 * * 1-5'
    
    # 🇺🇸 ตลาดหุ้นอเมริกา รันทุก 1 ชั่วโมง (22:15, 23:15, 00:15, 01:15 เวลาไทย)
    - cron: '15 15,16,17,18 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: |
          pip install requests playwright yfinance supabase pandas lxml
          playwright install chromium

      - name: Execute System
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TEST_MODE: ${{ secrets.TEST_MODE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. อัปเดตรายชื่อหุ้นใหม่เข้า Database ทุกครั้ง
          python 01_scraper.py
          
          # 2. เช็คเวลาเพื่อแยกรันตลาด (แปลงเป็นเวลาไทย +7)
          HOUR=$(TZ='Asia/Bangkok' date +%H)
          
          # 🧩 แบ่งรอบแบบ เหมากลางวัน vs เหมากลางคืน ป้องกันการหลุดเงื่อนไข
          # ช่วงเวลา 06:00 น. ถึง 18:00 น. ให้ถือเป็นรอบสแกนหุ้นไทย
          if [[ "06 07 08 09 10 11 12 13 14 15 16 17 18" =~ "$HOUR" ]]; then
            echo "🇹🇭 Scanning THAI Market (Daytime)..."
            python 02_monitor.py TH
          
          # เวลาอื่นๆ ที่เหลือ (ช่วงกลางคืน) ให้ถือเป็นรอบสแกนหุ้นอเมริกา
          else
            echo "🇺🇸 Scanning US Market (Nighttime)..."
            python 02_monitor.py US
          fi
