name: Global Trading Bot (Main System)

on:
  schedule:
    # 🇹🇭 ตลาดหุ้นไทย รันทุก 1 ชั่วโมง
    # เวลาไทย: 10:13, 11:13, 12:13, 14:13, 15:13, 16:13
    - cron: '13 3,4,5,7,8,9 * * 1-5'
    
    # 🇺🇸 ตลาดหุ้นอเมริกา (ตั้งเผื่อคลุมทั้ง Summer และ Winter)
    # เวลา UTC: 13, 14, 15, 16, 17, 18 (เวลาไทย 20:13 - 01:13)
    - cron: '13 13,14,15,16,17,18 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: |
          pip install requests playwright yfinance supabase pandas lxml
          playwright install chromium

      - name: Execute System
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TEST_MODE: ${{ secrets.TEST_MODE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. อัปเดตรายชื่อหุ้นใหม่เข้า Database ทุกครั้ง
          python 01_scraper.py
          
          # 2. ดึงเวลาปัจจุบันของแต่ละโซน (ใช้ %-H เพื่อลบเลข 0 นำหน้า ป้องกันบั๊กใน Bash)
          BKK_HOUR=$(TZ='Asia/Bangkok' date +%-H)
          NY_HOUR=$(TZ='America/New_York' date +%-H)
          
          # ปริ้นท์เวลาออกมาดูเพื่อง่ายต่อการ Debug
          echo "⏰ BKK Hour: $BKK_HOUR"
          echo "🗽 NY Hour: $NY_HOUR"
          echo "---------------------------------"
          
          # 🇹🇭 Thai Market: เช็คเวลาไทย 10:00 - 16:59
          if [ "$BKK_HOUR" -ge 10 ] && [ "$BKK_HOUR" -le 16 ]; then
            echo "🇹🇭 Scanning THAI Market..."
            python 02_monitor.py TH
            
          # 🇺🇸 US Market: เช็คเวลานิวยอร์ก 09:00 - 15:59 (จัดการ Summer/Winter Auto)
          elif [ "$NY_HOUR" -ge 9 ] && [ "$NY_HOUR" -le 15 ]; then
            echo "🇺🇸 Scanning US Market..."
            python 02_monitor.py US
            
          else
            echo "💤 Market closed (or outside scanning hours). Skipping scan."
          fi
